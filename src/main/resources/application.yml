spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  profiles:
    active: dev

server:
  port: 8080

# Настройки JWT-авторизации
# secret  — секретный ключ, которым сервер подписывает токены. Должен быть длинным (>= 32 байт для HS256).
#           В реальном продакшене НИКОГДА не хранить секрет в репозитории — задавать через переменную окружения.
# ttl-ms  — время жизни токена в миллисекундах. По умолчанию 1 час.
jwt:
  secret: ${JWT_SECRET:dev-secret-please-change-this-to-a-long-random-value-32b+}
  ttl-ms: 3600000