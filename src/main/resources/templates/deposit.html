<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PayPocket — Пополнение</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <span class="brand">💳 PayPocket</span>
    <div>
        <a th:href="@{/dashboard}">Дашборд</a>
        <a th:href="@{/deposit}">Пополнить</a>
        <a th:href="@{/transfer}">Перевести</a>
        <a th:href="@{/logout}">Выйти</a>
    </div>
</div>

<div class="container">
    <div class="card" style="max-width: 500px; margin: 40px auto;">
        <h2>Пополнение кошелька</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/deposit}" method="post">
            <div class="form-group">
                <label for="walletId">Кошелёк</label>
                <select id="walletId" name="walletId" required>
                    <option th:each="wallet : ${wallets}"
                            th:value="${wallet.id}"
                            th:text="${wallet.name + ' — ' + wallet.balance + ' ' + wallet.currency}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Сумма</label>
                <input type="number" id="amount" name="amount"
                       step="0.01" min="0.01" required placeholder="1000.00">
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%;">
                Пополнить
            </button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
            <a th:href="@{/dashboard}">← Назад</a>
        </p>
    </div>
</div>
</body>
</html>
