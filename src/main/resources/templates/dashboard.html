<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayPocket — Главная</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">PayPocket</div>

        <div class="sidebar-user">
            <div class="avatar"
                 th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</div>
            <span class="sidebar-username" th:text="${user.username}">username</span>
        </div>

        <ul class="sidebar-nav">
            <li>
                <a th:href="@{/dashboard}" class="active">
                    <span class="nav-icon">⊞</span> Главная
                </a>
            </li>
            <li>
                <a th:href="@{/deposit}">
                    <span class="nav-icon">＋</span> Пополнить
                </a>
            </li>
            <li>
                <a th:href="@{/transfer}">
                    <span class="nav-icon">↗</span> Перевести
                </a>
            </li>
        </ul>

        <div class="sidebar-logout">
            <a th:href="@{/logout}">Выйти</a>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

        <h1 class="page-title">
            Привет, <span th:text="${user.username}">username</span>!
        </h1>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

        <!-- Wallet cards -->
        <div th:if="${!wallets.isEmpty()}" class="wallets-grid">
            <div th:each="wallet : ${wallets}" class="wallet-card">
                <div>
                    <div class="wc-label" th:text="${wallet.name}">Название счёта</div>
                    <div class="wc-balance">
                        <span th:text="${wallet.currency == 'USD' ? '$' : (wallet.currency == 'EUR' ? '€' : '₽')}">$</span><!--
                        --><span th:text=" ${wallet.balance}">0.00</span>
                    </div>
                    <div class="wc-currency" th:text="${wallet.currency}">USD</div>
                </div>
                <a th:href="@{/history/{id}(id=${wallet.id})}" class="btn btn-light btn-sm">
                    История
                </a>
            </div>
        </div>

        <div th:if="${wallets.isEmpty()}" class="card">
            <p class="empty">У вас пока нет счетов. Создайте первый!</p>
        </div>

        <!-- Quick actions -->
        <div th:unless="${wallets.isEmpty()}">
            <p class="section-label">Операции</p>
            <div class="action-row">
                <a th:href="@{/transfer}" class="action-btn">
                    <span class="action-icon">↗</span> Перевести
                </a>
                <a th:href="@{/deposit}" class="action-btn">
                    <span class="action-icon">＋</span> Пополнить
                </a>
            </div>
        </div>

        <!-- New wallet form -->
        <p class="section-label">Новый счёт</p>
        <div class="card">
            <div class="card-title">Создать счёт</div>
            <form th:action="@{/wallets/create}" method="post">
                <div class="inline-form">
                    <div class="field">
                        <input type="text" name="name"
                               required
                               placeholder="Название счёта">
                    </div>
                    <div class="field" style="max-width: 140px;">
                        <select name="currency">
                            <option value="RUB">₽ RUB</option>
                            <option value="USD">$ USD</option>
                            <option value="EUR">€ EUR</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-dark btn-sm" style="height: 48px; padding: 0 22px;">
                        Создать
                    </button>
                </div>
            </form>
        </div>

    </main>
</div>

</body>
</html>
