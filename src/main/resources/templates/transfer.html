<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayPocket — Перевод</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">PayPocket</div>

        <div class="sidebar-user">
            <div class="avatar">P</div>
        </div>

        <ul class="sidebar-nav">
            <li>
                <a th:href="@{/dashboard}">
                    <span class="nav-icon">⊞</span> Главная
                </a>
            </li>
            <li>
                <a th:href="@{/deposit}">
                    <span class="nav-icon">＋</span> Пополнить
                </a>
            </li>
            <li>
                <a th:href="@{/transfer}" class="active">
                    <span class="nav-icon">↗</span> Перевести
                </a>
            </li>
        </ul>

        <div class="sidebar-logout">
            <a th:href="@{/logout}">Выйти</a>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

        <h1 class="page-title">Перевод</h1>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <!-- Sender wallet summary -->
        <div class="wallet-summary" th:if="${!wallets.isEmpty()}">
            <div class="ws-label">С счёта</div>
            <div class="ws-name" th:text="${wallets[0].name}">Название счёта</div>
            <div class="ws-bal">
                <span th:text="${wallets[0].currency == 'USD' ? '$' : (wallets[0].currency == 'EUR' ? '€' : '₽')}">$</span><!--
                --><span th:text="${wallets[0].balance}">0.00</span>
            </div>
        </div>

        <div class="form-card">

            <form th:action="@{/transfer}" method="post">

                <div class="field">
                    <select id="fromWalletId" name="fromWalletId" required>
                        <option th:each="wallet : ${wallets}"
                                th:value="${wallet.id}"
                                th:text="${wallet.name + ' — ' + wallet.balance + ' ' + wallet.currency}">
                        </option>
                    </select>
                </div>

                <div class="field">
                    <input type="text"
                           id="recipientUsername" name="recipientUsername"
                           required
                           placeholder="Имя получателя">
                </div>

                <div class="field">
                    <input type="number"
                           id="amount" name="amount"
                           step="0.01" min="0.01"
                           required
                           placeholder="Сумма перевода">
                </div>

                <div style="margin-top: 6px;">
                    <button type="submit" class="btn btn-dark">Отправить</button>
                </div>

            </form>

        </div>

        <a th:href="@{/dashboard}" class="back-link">← Назад</a>

    </main>
</div>

</body>
</html>
