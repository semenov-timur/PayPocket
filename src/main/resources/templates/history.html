<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayPocket — История</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">PayPocket</div>

        <div class="sidebar-user">
            <div class="avatar"
                 th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</div>
            <span class="sidebar-username" th:text="${user.username}">username</span>
        </div>

        <ul class="sidebar-nav">
            <li>
                <a th:href="@{/dashboard(walletId=${selectedWalletId})}">
                    <span class="nav-icon">⊞</span> Главная
                </a>
            </li>
            <li>
                <a th:href="@{/deposit(walletId=${selectedWalletId})}">
                    <span class="nav-icon">＋</span> Пополнить
                </a>
            </li>
            <li>
                <a th:href="@{/transfer(walletId=${selectedWalletId})}">
                    <span class="nav-icon">↗</span> Перевести
                </a>
            </li>
            <li>
                <a th:href="@{/convert(walletId=${selectedWalletId})}">
                    <span class="nav-icon">⇄</span> Конвертировать
                </a>
            </li>
        </ul>

        <div class="sidebar-logout">
            <a th:href="@{/logout}">Выйти</a>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

        <h1 class="page-title">История операций</h1>

        <!-- Wallet header card -->
        <div class="wallet-summary">
            <div class="ws-label">Счёт</div>
            <div class="ws-name" th:text="${wallet.name}">Название счёта</div>
            <div class="ws-bal">
                <span th:text="${wallet.currency.name() == 'USD' ? '$' : (wallet.currency.name() == 'EUR' ? '€' : '₽')}">$</span><!--
                --><span th:text="${wallet.balance}">0.00</span>
            </div>
            <div class="ws-cur" th:text="${wallet.currency}">USD</div>
        </div>

        <!-- Transaction list -->
        <div class="card">

            <div th:if="${transactions.isEmpty()}" class="empty">
                Операций пока нет.
            </div>

            <ul class="tx-list" th:unless="${transactions.isEmpty()}">
                <li th:each="tx : ${transactions.content}" class="tx-item">

                    <div class="tx-info">
                        <span class="tx-title" th:text="${tx.type.description}">Тип</span>
                        <span class="tx-desc" th:text="${tx.description ?: '—'}">Описание</span>
                    </div>

                    <div class="tx-right">
                        <span class="tx-amount"
                              th:classappend="${tx.type.name().contains('OUT') || tx.type.name() == 'WITHDRAW' ? 'expense' : 'income'}"
                              th:text="${(tx.type.name().contains('OUT') || tx.type.name() == 'WITHDRAW' ? '−' : '+') + tx.amount + ' ' + wallet.currency.symbol}">
                            +1 000 $
                        </span>
                        <span class="tx-date"
                              th:text="${#temporals.format(tx.createdAt, 'HH:mm · dd.MM.yy')}">
                            22:02
                        </span>
                    </div>

                </li>
            </ul>

            <!-- Pagination -->
            <div th:if="${transactions.totalPages > 1}" class="pagination">
                <a th:if="${currentPage > 0}"
                   th:href="@{/history/{id}(id=${wallet.id}, page=${currentPage - 1})}">
                    ← Назад
                </a>

                <span>
                    <span th:text="${currentPage + 1}">1</span>
                    /
                    <span th:text="${transactions.totalPages}">1</span>
                </span>

                <a th:if="${transactions.hasNext()}"
                   th:href="@{/history/{id}(id=${wallet.id}, page=${currentPage + 1})}">
                    Вперёд →
                </a>
            </div>

        </div>

        <a th:href="@{/dashboard}" class="back-link">← К главной</a>

    </main>
</div>

</body>
</html>
