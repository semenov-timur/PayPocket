<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PayPocket — Вход</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <span class="brand">💳 PayPocket</span>
    <div>
        <a th:href="@{/login}">Войти</a>
        <a th:href="@{/register}">Регистрация</a>
    </div>
</div>

<div class="container">
    <div class="card" style="max-width: 400px; margin: 40px auto;">
        <h2>Вход</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username"
                       required placeholder="alice">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password"
                       required placeholder="Пароль">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Войти
            </button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
            Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
        </p>
    </div>
</div>
</body>
</html>
